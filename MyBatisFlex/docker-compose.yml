services:
  mysql:
    image: mysql:8.4
    container_name: flex-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: flex_demo
      TZ: Asia/Shanghai
    ports:
      # 宿主机 3308 -> 容器内 MySQL 默认 3306
      - "3308:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flex-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8180
      # 容器间通信走服务名 mysql，端口用容器内 3306（不是宿主机映射的 3308）
      DB_URL: jdbc:mysql://mysql:3306/flex_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      DB_USERNAME: root
      DB_PASSWORD: 123456
    ports:
      - "8180:8180"

volumes:
  mysql_data:

