services:
  mysql:
    image: mysql:8.4
    container_name: webflux-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: webflux_demo
      TZ: Asia/Shanghai
      LANG: C.UTF-8
    ports:
      - "3317:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webflux-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8190
      R2DBC_URL: r2dbc:mysql://mysql:3306/webflux_demo?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: 123456
      USER_API_BASE_URL: http://localhost:8190
    ports:
      - "8190:8190"

volumes:
  mysql_data:
