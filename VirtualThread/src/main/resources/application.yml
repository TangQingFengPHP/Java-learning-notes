server:
  port: ${SERVER_PORT:8191}

spring:
  application:
    name: virtual-thread-practice
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3318/virtual_thread_demo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_0900_ai_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}

app:
  base-url: ${APP_BASE_URL:http://localhost:8191}
  remote:
    max-concurrency: ${REMOTE_MAX_CONCURRENCY:20}

management:
  endpoints:
    web:
      exposure:
        include: health,info
